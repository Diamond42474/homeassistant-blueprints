blueprint:
  name: Philips Hue Tap Dial Switch – Multi Action Controller
  description: >
    Build automations for a Hue Tap Dial Switch using an action sensor (for example
    from Zigbee2MQTT). Map button single press, long press, and dial rotation to
    custom action sequences. Optional built-in dimming can be enabled for dial
    rotation.
  domain: automation

  input:
    action_sensor:
      name: Action sensor
      description: >
        Sensor entity that updates its state when a Tap Dial action occurs
        (for example sensor.<name>_action).
      selector:
        entity:
          domain: sensor

    # Action values emitted by the sensor
    button_1_single_value:
      name: Button 1 single press value
      default: button_1_press
      selector:
        text: {}
    button_1_long_value:
      name: Button 1 long press value
      default: button_1_hold
      selector:
        text: {}

    button_2_single_value:
      name: Button 2 single press value
      default: button_2_press
      selector:
        text: {}
    button_2_long_value:
      name: Button 2 long press value
      default: button_2_hold
      selector:
        text: {}

    button_3_single_value:
      name: Button 3 single press value
      default: button_3_press
      selector:
        text: {}
    button_3_long_value:
      name: Button 3 long press value
      default: button_3_hold
      selector:
        text: {}

    button_4_single_value:
      name: Button 4 single press value
      default: button_4_press
      selector:
        text: {}
    button_4_long_value:
      name: Button 4 long press value
      default: button_4_hold
      selector:
        text: {}

    dial_clockwise_value:
      name: Dial clockwise value
      default: dial_rotate_right
      selector:
        text: {}
    dial_counterclockwise_value:
      name: Dial counterclockwise value
      default: dial_rotate_left
      selector:
        text: {}

    # Optional built-in dimming for dial rotation
    enable_builtin_dimming:
      name: Enable built-in dimming on dial rotate
      description: >
        If enabled, clockwise rotation increases brightness and counterclockwise
        decreases brightness for the target below.
      default: false
      selector:
        boolean: {}

    dim_target:
      name: Dimming target (optional)
      description: Light or area to dim when built-in dimming is enabled.
      default: {}
      selector:
        target:
          entity:
            domain: light

    dim_step_pct:
      name: Dimming step (%)
      default: 10
      selector:
        number:
          min: 1
          max: 50
          step: 1
          unit_of_measurement: "%"

    # User-defined action sequences
    on_button_1_single:
      name: Button 1 single press action
      default: []
      selector:
        action: {}
    on_button_1_long:
      name: Button 1 long press action
      default: []
      selector:
        action: {}

    on_button_2_single:
      name: Button 2 single press action
      default: []
      selector:
        action: {}
    on_button_2_long:
      name: Button 2 long press action
      default: []
      selector:
        action: {}

    on_button_3_single:
      name: Button 3 single press action
      default: []
      selector:
        action: {}
    on_button_3_long:
      name: Button 3 long press action
      default: []
      selector:
        action: {}

    on_button_4_single:
      name: Button 4 single press action
      default: []
      selector:
        action: {}
    on_button_4_long:
      name: Button 4 long press action
      default: []
      selector:
        action: {}

    on_dial_clockwise:
      name: Dial clockwise action
      description: Optional custom actions in addition to built-in dimming.
      default: []
      selector:
        action: {}
    on_dial_counterclockwise:
      name: Dial counterclockwise action
      description: Optional custom actions in addition to built-in dimming.
      default: []
      selector:
        action: {}

mode: queued
max: 20

trigger:
  - platform: state
    entity_id: !input action_sensor

variables:
  action_value: "{{ trigger.to_state.state if trigger.to_state is not none else '' }}"
  dim_enabled: !input enable_builtin_dimming
  dim_target: !input dim_target
  step_pct: !input dim_step_pct

  button_1_single_value: !input button_1_single_value
  button_1_long_value: !input button_1_long_value
  button_2_single_value: !input button_2_single_value
  button_2_long_value: !input button_2_long_value
  button_3_single_value: !input button_3_single_value
  button_3_long_value: !input button_3_long_value
  button_4_single_value: !input button_4_single_value
  button_4_long_value: !input button_4_long_value
  dial_clockwise_value: !input dial_clockwise_value
  dial_counterclockwise_value: !input dial_counterclockwise_value

condition:
  - condition: template
    value_template: "{{ action_value not in ['unknown', 'unavailable', 'None', ''] }}"

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ action_value == button_1_single_value }}"
        sequence: !input on_button_1_single

      - conditions:
          - condition: template
            value_template: "{{ action_value == button_1_long_value }}"
        sequence: !input on_button_1_long

      - conditions:
          - condition: template
            value_template: "{{ action_value == button_2_single_value }}"
        sequence: !input on_button_2_single

      - conditions:
          - condition: template
            value_template: "{{ action_value == button_2_long_value }}"
        sequence: !input on_button_2_long

      - conditions:
          - condition: template
            value_template: "{{ action_value == button_3_single_value }}"
        sequence: !input on_button_3_single

      - conditions:
          - condition: template
            value_template: "{{ action_value == button_3_long_value }}"
        sequence: !input on_button_3_long

      - conditions:
          - condition: template
            value_template: "{{ action_value == button_4_single_value }}"
        sequence: !input on_button_4_single

      - conditions:
          - condition: template
            value_template: "{{ action_value == button_4_long_value }}"
        sequence: !input on_button_4_long

      - conditions:
          - condition: template
            value_template: "{{ action_value == dial_clockwise_value }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ dim_enabled and (dim_target | tojson != '{}') }}"
            then:
              - service: light.turn_on
                target: !input dim_target
                data:
                  brightness_step_pct: "{{ step_pct | int }}"
          - sequence: !input on_dial_clockwise

      - conditions:
          - condition: template
            value_template: "{{ action_value == dial_counterclockwise_value }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ dim_enabled and (dim_target | tojson != '{}') }}"
            then:
              - service: light.turn_on
                target: !input dim_target
                data:
                  brightness_step_pct: "{{ (step_pct | int) * -1 }}"
          - sequence: !input on_dial_counterclockwise
